<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DropMentor AI</title>
</head>

<body style="margin:0; font-family: Arial; background:#0f172a; color:white; display:flex; flex-direction:column; height:100vh;">

  <!-- HEADER -->
  <div style="padding:15px; border-bottom:1px solid #1e293b;">
    <h2 style="margin:0;">DropMentor AI 🌍</h2>
  </div>

  <!-- CHAT AREA -->
  <div id="chat" style="flex:1; overflow-y:auto; padding:20px;"></div>

  <!-- INPUT AREA -->
  <div style="padding:15px; border-top:1px solid #1e293b;">

    <div style="display:flex; gap:10px;">
      <input id="input" placeholder="Ask anything about dropshipping..." 
      style="flex:1; padding:12px; border-radius:8px; border:none;" />

      <select id="tier" style="padding:10px; border-radius:8px;">
        <option value="free">Free</option>
        <option value="starter">Starter</option>
        <option value="pro">PRO</option>
      </select>

      <button onclick="send()" 
      style="padding:12px 20px; border:none; border-radius:8px; background:#22c55e; color:white;">
        Send
      </button>
    </div>

  </div>

  <script>
    let sessionId = localStorage.getItem("sessionId");

    if (!sessionId) {
      sessionId = Math.random().toString(36).substring(2);
      localStorage.setItem("sessionId", sessionId);
    }

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        send();
      }
    });

    function addMessage(text, isUser) {
      const div = document.createElement("div");

      div.style.maxWidth = "600px";
      div.style.marginBottom = "15px";
      div.style.padding = "12px";
      div.style.borderRadius = "10px";
      div.style.lineHeight = "1.5";

      if (isUser) {
        div.style.background = "#22c55e";
        div.style.marginLeft = "auto";
      } else {
        div.style.background = "#1e293b";
        div.style.marginRight = "auto";
      }

      div.innerText = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const message = input.value;
      const tier = document.getElementById("tier").value;

      if (!message) return;

      addMessage(message, true);
      input.value = "";

      const loading = document.createElement("div");
      loading.innerText = "Thinking...";
      loading.style.opacity = "0.6";
      chat.appendChild(loading);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message, tier, sessionId })
        });

        const data = await res.json();

        chat.removeChild(loading);
        addMessage(data.reply, false);

      } catch (err) {
        chat.removeChild(loading);
        addMessage("Error connecting to AI", false);
      }
    }
  </script>

</body>
</html>
