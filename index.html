<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DropMentor AI</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 40px; background:#0f172a; color:white;">

  <h1 style="font-size:40px;">DropMentor AI 🌍</h1>
  <p style="opacity:0.7;">Ask anything about dropshipping</p>

  <br>

  <input id="input" placeholder="Ask something..." 
  style="width:320px; padding:12px; border-radius:8px; border:none;" />

  <br><br>

  <button onclick="send('free')" style="padding:10px; border-radius:8px;">Free</button>
  <button onclick="send('starter')" style="padding:10px; border-radius:8px;">Starter</button>
  <button onclick="send('pro')" style="padding:10px; border-radius:8px;">PRO</button>

  <p id="response" style="margin-top:30px; max-width:600px; margin:auto;"></p>

  <br><br>

  <!-- 🔒 ADMIN -->
  <button onclick="loadAdmin()" style="background:red; color:white; padding:10px; border-radius:8px;">
    Open Admin
  </button>

  <pre id="admin" style="text-align:left; max-width:800px; margin:auto; margin-top:20px;"></pre>

  <script>
    async function send(tier) {
      const message = document.getElementById("input").value;

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message, tier })
      });

      const data = await res.json();
      document.getElementById("response").innerText = data.reply;
    }

    async function loadAdmin() {
      const key = prompt("Enter admin key:");

      const res = await fetch("/api/chat", {
        method: "GET",
        headers: {
          "x-admin-key": key
        }
      });

      const data = await res.json();

      document.getElementById("admin").innerText = JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
