<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DropMentor AI</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 40px; background:#0f172a; color:white;">

  <h1 style="font-size:40px;">DropMentor AI 🌍</h1>
  <p style="opacity:0.7;">Ask anything about dropshipping</p>

  <br>

  <input id="input" placeholder="Ask something like: how to start dropshipping?" 
  style="width:320px; padding:12px; border-radius:8px; border:none;" />

  <br><br>

  <button onclick="send('free')" 
  style="padding:10px 15px; border:none; border-radius:8px; background:#22c55e; color:white;">
    Free
  </button>

  <button onclick="send('starter')" 
  style="padding:10px 15px; border:none; border-radius:8px; background:#3b82f6; color:white; margin-left:10px;">
    Starter
  </button>

  <button onclick="send('pro')" 
  style="padding:10px 15px; border:none; border-radius:8px; background:#f59e0b; color:white; margin-left:10px;">
    PRO
  </button>

  <p id="response" 
  style="margin-top:30px; max-width:650px; margin-left:auto; margin-right:auto; line-height:1.6;">
  </p>

  <br>

  <p style="opacity:0.6;">
    Free = basic • Starter = guidance • PRO = full strategy
  </p>

  <script>
    async function send(tier = "free") {
      const message = document.getElementById("input").value;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message, tier })
        });

        const data = await res.json();
        document.getElementById("response").innerText = data.reply;

      } catch (err) {
        document.getElementById("response").innerText = "Error connecting to AI";
      }
    }
  </script>

</body>
</html>
