<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DropMentor AI</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 40px; background:#0f172a; color:white;">

  <h1 style="font-size:40px;">DropMentor AI 🌍</h1>
  <p style="opacity:0.7;">Find winning products in seconds</p>

  <br>

  <p>Get 3 winning dropshipping ideas instantly:</p>

  <br>

  <select id="lang" style="padding:8px; border-radius:6px;">
    <option value="en">English</option>
    <option value="et">Eesti</option>
  </select>

  <br><br>

  <input id="input" placeholder="Ask something like: what product should I sell?" 
  style="width:300px; padding:12px; border-radius:8px; border:none; margin-right:10px;" />

  <br><br>

  <button onclick="send(false)" 
  style="padding:12px 20px; border:none; border-radius:8px; background:#22c55e; color:white; cursor:pointer;">
    Free Answer
  </button>

  <button onclick="unlockPro()" 
  style="padding:12px 20px; border:none; border-radius:8px; background:#f59e0b; color:white; cursor:pointer; margin-left:10px;">
    Unlock PRO
  </button>

  <p id="response" 
  style="margin-top:30px; max-width:600px; margin-left:auto; margin-right:auto; line-height:1.5;">
  </p>

  <br>

  <p style="opacity:0.7;">
    Want profit, supplier, and ad strategy for these products?
  </p>

  <script>
    async function send(isPro = false) {
      const message = document.getElementById("input").value;
      const lang = document.getElementById("lang").value;

      const finalMessage = `[Language: ${lang}] ` + message;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: finalMessage, pro: isPro })
        });

        const data = await res.json();
        document.getElementById("response").innerText = data.reply;

      } catch (err) {
        document.getElementById("response").innerText = "Error connecting to AI";
      }
    }

    function unlockPro() {
      const confirmed = confirm("PRO version costs 9€. Continue?");

      if (confirmed) {
        send(true);
      }
    }
  </script>

</body>
</html>
