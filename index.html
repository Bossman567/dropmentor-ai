<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DropMentor AI</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 40px; background:#0f172a; color:white;">

  <h1 style="font-size:40px;">DropMentor AI 🌍</h1>
  <p style="opacity:0.7;">Find winning products & start dropshipping</p>

  <br>

  <select id="lang" style="padding:8px; border-radius:6px;">
    <option value="en">English</option>
    <option value="et">Eesti</option>
  </select>

  <br><br>

  <input id="input" placeholder="Ask: what product should I sell?" 
  style="width:300px; padding:12px; border-radius:8px; border:none;" />

  <br><br>

  <button onclick="send('free')" 
  style="padding:10px 15px; border:none; border-radius:8px; background:#22c55e; color:white;">
    Free
  </button>

  <button onclick="send('starter')" 
  style="padding:10px 15px; border:none; border-radius:8px; background:#3b82f6; color:white; margin-left:10px;">
    Starter (5€/week)
  </button>

  <button onclick="send('pro')" 
  style="padding:10px 15px; border:none; border-radius:8px; background:#f59e0b; color:white; margin-left:10px;">
    PRO (9€)
  </button>

  <p id="response" 
  style="margin-top:30px; max-width:600px; margin-left:auto; margin-right:auto; line-height:1.5;">
  </p>

  <br>

  <p style="opacity:0.6;">
    Free = ideas • Starter = how to start • PRO = full strategy
  </p>

  <script>
    async function send(tier = "free") {
      const message = document.getElementById("input").value;
      const lang = document.getElementById("lang").value;

      const finalMessage = `[Language: ${lang}] ` + message;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: finalMessage, tier })
        });

        const data = await res.json();
        document.getElementById("response").innerText = data.reply;

      } catch (err) {
        document.getElementById("response").innerText = "Error connecting to AI";
      }
    }
  </script>

</body>
</html>
