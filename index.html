<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DropMentor AI</title>
</head>

<body style="margin:0; font-family:Arial; display:flex; height:100vh; background:#0f172a; color:white;">

  <!-- SIDEBAR -->
  <div style="width:260px; background:#020617; padding:20px; border-right:1px solid #1e293b; display:flex; flex-direction:column;">
    <h3>DropMentor</h3>

    <button onclick="newChat()" 
    style="margin:15px 0; padding:10px; border:none; border-radius:8px; background:#22c55e; color:white;">
      + New Chat
    </button>

    <div id="history" style="flex:1; overflow-y:auto;"></div>
  </div>

  <!-- MAIN -->
  <div style="flex:1; display:flex; flex-direction:column;">

    <!-- HEADER -->
    <div style="padding:15px; border-bottom:1px solid #1e293b;">
      <b>DropMentor AI</b>
      <span style="opacity:0.5;"> • PRO UI</span>
    </div>

    <!-- CHAT -->
    <div id="chat" style="flex:1; overflow-y:auto; padding:25px;"></div>

    <!-- INPUT -->
    <div style="padding:20px; border-top:1px solid #1e293b;">
      <div style="display:flex; gap:10px;">
        
        <input id="input" placeholder="Ask anything..." 
        style="flex:1; padding:14px; border-radius:10px; border:none; background:#1e293b; color:white;" />

        <select id="tier" style="padding:12px; border-radius:10px;">
          <option value="free">Free</option>
          <option value="starter">Starter</option>
          <option value="pro">PRO</option>
        </select>

        <button onclick="send()" 
        style="padding:14px 20px; border:none; border-radius:10px; background:#22c55e; color:white;">
          Send
        </button>

      </div>
    </div>

  </div>

  <script>
    let chats = JSON.parse(localStorage.getItem("chats") || "[]");
    let currentChat = null;

    const chatDiv = document.getElementById("chat");
    const historyDiv = document.getElementById("history");
    const input = document.getElementById("input");

    function save() {
      localStorage.setItem("chats", JSON.stringify(chats));
    }

    function renderHistory() {
      historyDiv.innerHTML = "";

      chats.forEach((chat, i) => {
        const item = document.createElement("div");
        item.innerText = chat.title;
        item.style.padding = "10px";
        item.style.cursor = "pointer";
        item.style.opacity = "0.7";

        item.onclick = () => {
          currentChat = chats[i];
          renderChat();
        };

        historyDiv.appendChild(item);
      });
    }

    function newChat() {
      currentChat = {
        id: Math.random().toString(36),
        messages: [],
        title: "New Chat"
      };

      chats.unshift(currentChat);
      save();
      renderHistory();
      renderChat();
    }

    function renderChat() {
      chatDiv.innerHTML = "";

      currentChat.messages.forEach(msg => {
        addMessage(msg.text, msg.user, false);
      });
    }

    function addMessage(text, isUser, saveMsg = true) {
      const wrap = document.createElement("div");
      wrap.style.display = "flex";
      wrap.style.marginBottom = "20px";

      const bubble = document.createElement("div");
      bubble.style.padding = "14px";
      bubble.style.borderRadius = "12px";
      bubble.style.maxWidth = "650px";
      bubble.style.whiteSpace = "pre-wrap";

      if (isUser) {
        wrap.style.justifyContent = "flex-end";
        bubble.style.background = "#22c55e";
      } else {
        wrap.style.justifyContent = "flex-start";
        bubble.style.background = "#1e293b";

        const copy = document.createElement("button");
        copy.innerText = "Copy";
        copy.style.marginLeft = "10px";
        copy.style.fontSize = "12px";
        copy.onclick = () => navigator.clipboard.writeText(text);

        wrap.appendChild(copy);
      }

      bubble.innerText = text;
      wrap.appendChild(bubble);
      chatDiv.appendChild(wrap);

      if (saveMsg) {
        currentChat.messages.push({ text, user: isUser });
        save();
      }

      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    input.addEventListener("keypress", e => {
      if (e.key === "Enter") send();
    });

    async function send() {
      const message = input.value;
      const tier = document.getElementById("tier").value;

      if (!message) return;

      addMessage(message, true);
      input.value = "";

      const loading = document.createElement("div");
      loading.innerText = "Thinking...";
      loading.style.opacity = "0.5";
      chatDiv.appendChild(loading);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            tier,
            sessionId: currentChat.id
          })
        });

        const data = await res.json();

        chatDiv.removeChild(loading);
        addMessage(data.reply, false);

        if (currentChat.title === "New Chat") {
          currentChat.title = message.slice(0, 25);
          save();
          renderHistory();
        }

      } catch {
        chatDiv.removeChild(loading);
        addMessage("Error connecting", false);
      }
    }

    // init
    if (chats.length === 0) newChat();
    else {
      currentChat = chats[0];
      renderHistory();
      renderChat();
    }
  </script>

</body>
</html>
