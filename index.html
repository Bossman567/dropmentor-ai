<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DropMentor AI</title>
</head>

<body style="margin:0; font-family:Arial; display:flex; height:100vh; background:#0f172a; color:white;">

  <!-- SIDEBAR -->
  <div style="width:220px; background:#020617; padding:20px; border-right:1px solid #1e293b;">
    <h3 style="margin-top:0;">DropMentor</h3>
    <p style="opacity:0.6;">AI dropshipping assistant</p>
    <hr style="border:0; border-top:1px solid #1e293b; margin:20px 0;">
    <button onclick="newChat()" style="width:100%; padding:10px; border:none; border-radius:8px; background:#22c55e; color:white;">
      + New Chat
    </button>
  </div>

  <!-- MAIN -->
  <div style="flex:1; display:flex; flex-direction:column;">

    <!-- CHAT -->
    <div id="chat" style="flex:1; overflow-y:auto; padding:30px;"></div>

    <!-- INPUT -->
    <div style="padding:20px; border-top:1px solid #1e293b;">
      <div style="display:flex; gap:10px;">
        
        <input id="input" placeholder="Ask anything about dropshipping..." 
        style="flex:1; padding:14px; border-radius:10px; border:none; outline:none; background:#1e293b; color:white;" />

        <select id="tier" style="padding:12px; border-radius:10px;">
          <option value="free">Free</option>
          <option value="starter">Starter</option>
          <option value="pro">PRO</option>
        </select>

        <button onclick="send()" 
        style="padding:14px 20px; border:none; border-radius:10px; background:linear-gradient(135deg,#22c55e,#16a34a); color:white;">
          Send
        </button>

      </div>
    </div>

  </div>

  <script>
    let sessionId = Math.random().toString(36).substring(2);

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") send();
    });

    function newChat() {
      chat.innerHTML = "";
      sessionId = Math.random().toString(36).substring(2);
    }

    function addMessage(text, isUser) {
      const wrapper = document.createElement("div");
      wrapper.style.display = "flex";
      wrapper.style.marginBottom = "20px";

      const bubble = document.createElement("div");
      bubble.style.maxWidth = "600px";
      bubble.style.padding = "14px";
      bubble.style.borderRadius = "12px";
      bubble.style.lineHeight = "1.6";
      bubble.style.whiteSpace = "pre-wrap";

      if (isUser) {
        wrapper.style.justifyContent = "flex-end";
        bubble.style.background = "#22c55e";
      } else {
        wrapper.style.justifyContent = "flex-start";
        bubble.style.background = "#1e293b";

        // COPY BUTTON
        const copy = document.createElement("button");
        copy.innerText = "Copy";
        copy.style.marginTop = "8px";
        copy.style.fontSize = "12px";
        copy.onclick = () => navigator.clipboard.writeText(text);

        wrapper.appendChild(bubble);
        wrapper.appendChild(copy);
      }

      bubble.innerText = text;

      wrapper.appendChild(bubble);
      chat.appendChild(wrapper);

      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const message = input.value;
      const tier = document.getElementById("tier").value;

      if (!message) return;

      addMessage(message, true);
      input.value = "";

      const loading = document.createElement("div");
      loading.innerText = "Thinking...";
      loading.style.opacity = "0.6";
      chat.appendChild(loading);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message, tier, sessionId })
        });

        const data = await res.json();

        chat.removeChild(loading);
        addMessage(data.reply, false);

      } catch (err) {
        chat.removeChild(loading);
        addMessage("Error connecting to AI", false);
      }
    }
  </script>

</body>
</html>
